name: Build Qwen3 ASR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: ${{ matrix.os }} - Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query-version: 1.4.341.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install Dependencies (Conan)
        run: |
          # Use RelWithDebInfo as requested by user's local build
          conan install . --build=missing -s build_type=RelWithDebInfo -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Configure CMake
        shell: bash
        run: |
          # Use the toolchain and preset logic generated by Conan
          cmake --preset conan-relwithdebinfo \
            -DQWEN3_ASR_ENABLE_VULKAN=ON \
            -DQWEN3_ASR_TIMING=ON

      - name: Build
        run: |
          # Only build, no tests
          cmake --build --preset conan-relwithdebinfo --target qwen3_asr_shared qwen3-asr-cli

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-asr-${{ matrix.os }}
          path: |
            build/RelWithDebInfo/qwen3_asr_shared.dll
            build/RelWithDebInfo/qwen3-asr-cli.exe
            build/RelWithDebInfo/libqwen3_asr_shared.so
            build/RelWithDebInfo/qwen3-asr-cli
            build/qwen3_asr_shared.dll
            build/qwen3-asr-cli.exe
            build/libqwen3_asr_shared.so
            build/qwen3-asr-cli
